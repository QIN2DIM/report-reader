<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Reader</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", Arial, sans-serif;
            background: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .form-container {
            background: #fff;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 560px;
        }
        .form-container h1 {
            font-size: 1.4rem;
            color: #2c3e50;
            margin-bottom: 24px;
            font-weight: 600;
        }
        .form-container label {
            display: block;
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-container input[type="url"] {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
        }
        .form-container input[type="url"]:focus {
            border-color: #ffc000;
            box-shadow: 0 0 0 3px rgba(255,192,0,0.15);
        }
        .form-container button {
            margin-top: 16px;
            width: 100%;
            padding: 12px;
            background: linear-gradient(to right, #f7ce68, #fbabfe);
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            color: #2c3e50;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .form-container button:hover {
            opacity: 0.85;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>Report Reader</h1>
        <form method="GET" action="/">
            <label for="url">输入 URL</label>
            <input type="url" id="url" name="url"
                   placeholder="https://example.com/document.md" required autofocus>
            <button type="submit">加载</button>
        </form>
    </div>
</body>
</html>
